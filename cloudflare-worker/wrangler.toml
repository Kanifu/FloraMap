name = "floramap-proxy"
main = "worker.js"
compatibility_date = "2024-09-23"

# Secrets — set via CLI (never in this file):
#   wrangler secret put GEMINI_API_KEY   ← your Gemini key
#   wrangler secret put FLORAMAP_TOKEN   ← random string, also set in app .env

# Optional KV rate limiting:
# 1. Run: wrangler kv:namespace create RATE_LIMIT
# 2. Paste the returned id below and uncomment the block.

# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id     = "PASTE_YOUR_KV_ID_HERE"
